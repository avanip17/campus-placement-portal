{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0 fw-bold text-dark">Post Placement Drive</h3>
            <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
        </div>

        <div class="card shadow-sm border-0" style="border-top: 5px solid #28a745 !important;">
            <div class="card-body p-4">

                <div class="alert alert-info border-0 bg-info bg-opacity-10 text-info-emphasis">
                    <i class="bi bi-info-circle-fill me-2"></i> New drives require Admin approval before they become
                    visible to students.
                </div>

                <form method="POST" action="{{ url_for('company.create_drive') }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">JOB TITLE / ROLE</label>
                        <input name="job_title" class="form-control" placeholder="e.g. Junior Software Engineer"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">JOB DESCRIPTION</label>
                        <textarea name="description" class="form-control" rows="5"
                            placeholder="Detail the responsibilities, package (CTC), and expectations..."
                            required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">ELIGIBILITY CRITERIA</label>
                            <input name="eligibility" class="form-control" placeholder="e.g. CS/IT Dept, CGPA > 7.0"
                                required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold small text-muted">APPLICATION DEADLINE</label>
                            <input type="date" name="deadline" class="form-control" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-2">
                        <button class="btn btn-success btn-lg fw-bold shadow-sm"><i
                                class="bi bi-send-fill me-2"></i>Submit for Approval</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
