{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0" style="border-top: 5px solid #0f4c81 !important;">
            <div class="card-header bg-white text-center py-4 border-bottom">
                <h3 class="mb-0 fw-bold text-dark"><i class="bi bi-mortarboard text-primary me-2"></i>Student
                    Registration</h3>
                <p class="text-muted mb-0">Create your profile to apply for campus drives</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.register_student') }}">

                    <h5 class="text-secondary border-bottom pb-2 mb-3">Personal Details</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">FULL NAME</label>
                            <input name="name" class="form-control"  required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">CONTACT NUMBER</label>
                            <input name="contact" class="form-control" required>
                        </div>
                    </div>

                    <h5 class="text-secondary border-bottom pb-2 mb-3 mt-3">Academic Details</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">DEPARTMENT / BRANCH</label>
                            <select name="department" class="form-select" required>
                                <option value="" disabled selected>Select Department...</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Information Technology">Information Technology</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">CURRENT CGPA</label>
                            <input name="cgpa" type="number" step="0.01" min="0" max="10" class="form-control"
                                placeholder="e.g. 8.5" required>
                        </div>
                    </div>

                    <h5 class="text-secondary border-bottom pb-2 mb-3 mt-3">Account Details</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">EMAIL ADDRESS</label>
                            <input name="email" type="email" class="form-control" placeholder="student@institute.edu"
                                required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold small text-muted">PASSWORD</label>
                            <input name="password" type="password" class="form-control" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-primary btn-lg fw-bold shadow-sm">Complete Registration</button>
                    </div>

                </form>
                <div class="mt-4 text-center">
                    <p class="text-muted">Already have an account? <a href="{{ url_for('auth.login') }}"
                            class="text-decoration-none fw-bold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
