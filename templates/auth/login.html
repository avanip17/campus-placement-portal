{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="card shadow border-0" style="border-top: 5px solid #0f4c81 !important;">
            <div class="card-header bg-white text-center py-4 border-bottom-0">
                <div class="mb-3">
                    <i class="bi bi-shield-lock-fill fs-1 text-primary"></i>
                </div>
                <h3 class="mb-0 fw-bold text-dark">Portal Login</h3>
                <p class="text-muted small">Access your dashboard</p>
            </div>
            <div class="card-body p-4 pt-0">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">EMAIL ADDRESS</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="bi bi-envelope text-muted"></i></span>
                            <input name="email" type="email" class="form-control border-start-0 ps-0"
                                placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">PASSWORD</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="bi bi-key text-muted"></i></span>
                            <input name="password" type="password" class="form-control border-start-0 ps-0"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small">LOGIN AS</label>
                        <select name="role" class="form-select shadow-sm" required>
                            <option value="" disabled selected>Select your role...</option>
                            <option value="student">Student</option>
                            <option value="company">Company / Recruiter</option>
                            <option value="admin">Institute Admin</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-primary btn-lg shadow-sm fw-bold">Login</button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3 border-top">
                <p class="mb-1 text-muted small">Don't have an account?</p>
                <a href="{{ url_for('auth.register_student') }}" class="btn btn-sm btn-outline-primary me-2">Register as
                    Student</a>
                <a href="{{ url_for('auth.register_company') }}" class="btn btn-sm btn-outline-success">Register as
                    Company</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
